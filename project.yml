name: ClearSpace
options:
  bundleIdPrefix: com.clearspace
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""

targets:
  ClearSpace:
    type: application
    platform: iOS
    sources:
      - path: ClearSpace
    settings:
      base:
        INFOPLIST_FILE: ClearSpace/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.clearspace.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: ClearSpace/ClearSpace.entitlements
